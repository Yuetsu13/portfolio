<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container">
        <div class="brand">Yue</div>
        <nav class="nav" aria-label="Primary">
          <a class="nav__link is-active" href="./index.html">Works</a>
          <a class="nav__link" href="./about.html">About</a>
          <a class="nav__link" href="./contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section>
        <div id="grid" class="grid" aria-live="polite"></div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>
    </main>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal__backdrop" data-close></div>
      <div class="viewer" role="dialog" aria-modal="true" aria-label="Work viewer">
        <button class="viewer__close" type="button" aria-label="Close" data-close>×</button>
        <button class="viewer__nav viewer__nav--prev" type="button" aria-label="Previous" data-prev>
          ‹
        </button>
        <button class="viewer__nav viewer__nav--next" type="button" aria-label="Next" data-next>
          ›
        </button>
        <div class="viewer__stage" id="modalMedia"></div>
        <div class="viewer__title" id="modalTitle"></div>
        <div class="viewer__date" id="modalDate"></div>
        <div class="viewer__desc" id="modalDesc"></div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
