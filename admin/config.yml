backend:
  name: git-gateway
  branch: main
media_folder: "images/uploads"
public_folder: "/images/uploads"
collections:
  - name: works
    label: Works
    folder: content/works
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Thumbnail, name: thumbnail, widget: image }
      - { label: "Work Image (optional)", name: image, widget: image, required: false }
      - { label: "Video URL (optional, Vimeo/YouTube)", name: video_url, widget: string, required: false }
      - { label: Description, name: description, widget: markdown }
      - { label: Date, name: date, widget: datetime }
