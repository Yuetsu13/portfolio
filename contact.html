<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Mona+Sans:wdth,wght@120,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <style>
      input, textarea, button {
        font-family: Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="brand">Yue</div>
        <nav class="nav" aria-label="Primary">
          <a class="nav__link" href="./index.html">Works</a>
          <a class="nav__link" href="./about.html">About</a>
          <a class="nav__link is-active" href="./contact.html">Contact</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <section style="padding: 22px 0 40px">
        <h1 style="margin: 0 0 24px; font-size: 18px">Contact</h1>
        <form action="https://formsubmit.co/uetsu1992@gmail.com" method="POST" style="max-width: 480px">
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="https://portfolio.moviemakers.workers.dev/contact.html" />
          <div style="margin-bottom: 20px">
            <input type="text" name="name" placeholder="Name" required
              style="width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 8px 0; font-size: 16px; outline: none; background: transparent;" />
          </div>
          <div style="margin-bottom: 20px">
            <input type="email" name="email" placeholder="Email address" required
              style="width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 8px 0; font-size: 16px; outline: none; background: transparent;" />
          </div>
          <div style="margin-bottom: 32px">
            <textarea name="message" placeholder="Message" required rows="4"
              style="width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 8px 0; font-size: 16px; outline: none; background: transparent; resize: none;"></textarea>
          </div>
          <button type="submit"
            style="border: none; background: #60DE39; color: #fff; padding: 12px 32px; font-size: 14px; font-weight: 700; letter-spacing: 4px; cursor: pointer;">
            SEND
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
